<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <linearGradient id="bottleGradsprite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A550;stop-opacity:0.7"/>
      <stop offset="40%" style="stop-color:#00A550;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#00A550;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00A550;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="capGradsprite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFE000;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#FFE000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE000;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="shadowsprite">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Bottle body -->
  <path d="M70,70 Q60,70 55,85 L45,110 Q40,120 40,135 L40,260 Q40,280 60,285 L140,285 Q160,280 160,260 L160,135 Q160,120 155,110 L145,85 Q140,70 130,70 Z"
        fill="url(#bottleGradsprite)" filter="url(#shadowsprite)"/>
  <!-- Bottle neck -->
  <rect x="80" y="40" width="40" height="32" rx="4" fill="url(#bottleGradsprite)"/>
  <!-- Cap -->
  <rect x="78" y="28" width="44" height="18" rx="6" fill="url(#capGradsprite)"/>
  <!-- Highlight -->
  <path d="M60,90 Q55,100 53,120 L53,240 Q53,255 58,260" stroke="rgba(255,255,255,0.4)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Label background -->
  <rect x="50" y="115" width="100" height="95" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Logo text -->
  <text x="100" y="145" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" font-style="italic">Sprite</text>

  <!-- Bottom reflection -->
  <ellipse cx="100" cy="283" rx="58" ry="6" fill="rgba(0,0,0,0.2)"/>
</svg>